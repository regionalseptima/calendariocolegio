<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda 3A | Fasta San Vicente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: #e2e8f0; border: 1px solid #e2e8f0; }
        .calendar-day { min-height: 110px; background-color: white; padding: 0.5rem; transition: background 0.2s; }
        .calendar-day:hover { background-color: #f1f5f9; }
        .btn-active { background-color: #2563eb !important; color: white !important; }
        @media (max-width: 640px) { .calendar-day { min-height: 80px; } }
    </style>
</head>
<body class="text-slate-800">

    <div id="app" class="flex flex-col h-screen">
        <header class="bg-white border-b border-slate-200 p-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 text-white p-2 rounded-lg font-bold">3A</div>
                <div>
                    <h1 class="text-lg font-bold leading-tight">Agenda Escolar</h1>
                    <p id="view-indicator" class="text-xs text-slate-500 font-medium uppercase tracking-wider">Marzo 2026</p>
                </div>
            </div>

            <div class="flex items-center justify-center gap-2">
                <button onclick="navigate(-1)" class="p-2 hover:bg-slate-100 rounded-lg"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="goToToday()" class="px-3 py-1 text-xs font-bold border rounded-lg hover:bg-slate-50">Hoy</button>
                <button onclick="navigate(1)" class="p-2 hover:bg-slate-100 rounded-lg"><i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="switchView('month')" id="btn-month" class="px-4 py-1.5 text-xs font-bold rounded-lg btn-active">Mes</button>
                <button onclick="switchView('week')" id="btn-week" class="px-4 py-1.5 text-xs font-bold rounded-lg">Semana</button>
                <button onclick="switchView('list')" id="btn-list" class="px-4 py-1.5 text-xs font-bold rounded-lg text-slate-500">Lista</button>
            </div>

            <button onclick="openModal()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-200 active:scale-95 transition-transform">
                <i class="fa-solid fa-plus mr-2"></i>Nueva Actividad
            </button>
        </header>

        <main id="calendar-container" class="flex-1 overflow-y-auto p-4 lg:p-6 bg-slate-50">
            </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-bold">Nueva Actividad</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-times"></i></button>
            </div>
            <form onsubmit="saveEvent(event)" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Fecha</label>
                        <input type="date" id="input-date" required onchange="updateTimeOptions()" class="w-full p-2 border rounded-lg outline-blue-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tipo</label>
                        <select id="input-type" class="w-full p-2 border rounded-lg outline-blue-500">
                            <option value="prueba">Prueba</option>
                            <option value="tp">Trabajo Práctico</option>
                            <option value="obligacion">Obligación</option>
                        </select>
                    </div>
                </div>
                
                <div id="time-selector-container">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Materia y Horario</label>
                    <div id="time-slots" class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-1">
                        </div>
                    <input type="hidden" id="input-subject">
                    <input type="hidden" id="input-time">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Título</label>
                    <input type="text" id="input-title" required placeholder="Ej: Evaluación de Historia" class="w-full p-2 border rounded-lg outline-blue-500">
                </div>

                <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg active:scale-95 transition-transform">Guardar</button>
            </form>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN Y DATOS ---
        let viewDate = new Date(); // Fecha que el usuario está viendo
        let currentView = 'month';
        let events = JSON.parse(localStorage.getItem('agenda3A_v2')) || [];

        const timetable = [
            ['GEOGRAFÍA', 'BIOLOGÍA', 'CONSTRUCCIÓN', 'HISTORIA', '', 'ED FÍSICA'], // Lunes
            ['MATEMATICA', 'GEOGRAFÍA', 'FOR DOC', 'PDL', 'BIOLOGÍA', 'FISÍCO QUÍMICA'], // Martes
            ['FOR DOC', 'MATEMÁTICA', 'PDL', 'INGLÉS', 'TUTORIA', 'COMEDOR', '', 'TECNOLOGIA', 'TECNOLOGIA'], // Miércoles
            ['MATEMÁTICA', 'MATEMATICA', 'TEATRO', 'PDL', 'FISÍCO QUÍMICA', 'TUTORIA', 'TUTORIA'], // Jueves
            ['TEATRO', 'PDL', 'CONSTRUCCIÓN', 'HISTORIA', 'INGLÉS', 'ED FÍSICA'] // Viernes
        ];

        const timeLabels = ['07:40', '08:40', '09:55', '11:05', '12:05', '13:15', '14:30', '14:00', '14:40', '15:30', '16:10'];

        // --- FUNCIONES DE RENDERIZADO ---
        function render() {
            const container = document.getElementById('calendar-container');
            const indicator = document.getElementById('view-indicator');
            container.innerHTML = '';

            if (currentView === 'month') {
                indicator.innerText = viewDate.toLocaleString('es-AR', { month: 'long', year: 'numeric' });
                renderMonth(container);
            } else if (currentView === 'week') {
                indicator.innerText = "Semana del " + getStartOfWeek(viewDate).toLocaleDateString();
                renderWeek(container);
            } else if (currentView === 'list') {
                indicator.innerText = "Próximas Actividades";
                renderList(container);
            }
        }

        function renderMonth(container) {
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Ajuste para que empiece en Lunes (0=Dom, 1=Lun...)
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;

            let html = `<div class="calendar-grid">`;
            ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'].forEach(d => {
                html += `<div class="bg-slate-100 p-2 text-center text-[10px] font-bold text-slate-500 uppercase">${d}</div>`;
            });

            for (let i = 0; i < startOffset; i++) html += `<div class="calendar-day bg-slate-50/50"></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = new Date().toISOString().split('T')[0] === dateStr;
                const dayEvents = events.filter(e => e.date === dateStr);

                html += `
                    <div class="calendar-day cursor-pointer" onclick="openModal('${dateStr}')">
                        <span class="text-xs font-bold ${isToday ? 'bg-blue-600 text-white w-6 h-6 flex items-center justify-center rounded-full' : ''}">${d}</span>
                        <div class="mt-1 space-y-1">
                            ${dayEvents.map(e => `<div class="text-[9px] p-1 rounded font-bold truncate ${getEventColor(e.type)}">${e.title}</div>`).join('')}
                        </div>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderWeek(container) {
            const start = getStartOfWeek(viewDate);
            let html = `<div class="grid grid-cols-1 md:grid-cols-5 gap-4">`;
            
            for (let i = 0; i < 5; i++) {
                const day = new Date(start);
                day.setDate(start.getDate() + i);
                const dateStr = day.toISOString().split('T')[0];
                const dayEvents = events.filter(e => e.date === dateStr);
                
                html += `
                    <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-200">
                        <h4 class="font-bold text-blue-600 text-sm mb-3">${day.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric' })}</h4>
                        <div class="space-y-2">
                            ${dayEvents.length ? dayEvents.map(e => `
                                <div class="p-2 rounded-lg border-l-4 ${getEventColor(e.type)} border-opacity-50">
                                    <div class="text-[10px] font-bold uppercase opacity-70">${e.subject}</div>
                                    <div class="text-xs font-bold">${e.title}</div>
                                </div>
                            `).join('') : '<p class="text-[10px] text-slate-400 italic">No hay actividades</p>'}
                        </div>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderList(container) {
            const sortedEvents = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));
            if (sortedEvents.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400"><i class="fa-solid fa-calendar-xmark text-4xl mb-3"></i><p>No tenés actividades guardadas.</p></div>`;
                return;
            }

            container.innerHTML = `
                <div class="max-w-2xl mx-auto space-y-3">
                    ${sortedEvents.map(e => `
                        <div class="bg-white p-4 rounded-xl border border-slate-200 flex items-center justify-between shadow-sm">
                            <div class="flex items-center gap-4">
                                <div class="text-center bg-slate-100 p-2 rounded-lg min-w-[60px]">
                                    <div class="text-xs font-bold text-blue-600">${new Date(e.date + 'T00:00:00').toLocaleDateString('es-AR', { day: 'numeric' })}</div>
                                    <div class="text-[9px] uppercase font-bold text-slate-500">${new Date(e.date + 'T00:00:00').toLocaleDateString('es-AR', { month: 'short' })}</div>
                                </div>
                                <div>
                                    <div class="text-[10px] font-bold text-slate-400 uppercase">${e.subject || 'Sin Materia'}</div>
                                    <div class="font-bold text-slate-800">${e.title}</div>
                                </div>
                            </div>
                            <button onclick="deleteEvent('${e.id}')" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // --- LÓGICA DE NEGOCIOS ---
        function updateTimeOptions() {
            const dateInput = document.getElementById('input-date').value;
            const slotsDiv = document.getElementById('time-slots');
            slotsDiv.innerHTML = '';
            
            if (!dateInput) return;

            // FIX DEL LUNES/FIN DE SEMANA:
            // Usamos split y new Date(y, m, d) para evitar el error de zona horaria UTC.
            const [y, m, d] = dateInput.split('-').map(Number);
            const selectedDate = new Date(y, m - 1, d); 
            const dayOfWeek = selectedDate.getDay(); // 0=Dom, 1=Lun, 6=Sab

            if (dayOfWeek === 0 || dayOfWeek === 6) {
                slotsDiv.innerHTML = `<p class="col-span-2 text-red-500 text-[10px] font-bold text-center py-4 bg-red-50 rounded-lg">Fines de semana no hay clases</p>`;
                return;
            }

            const daySchedule = timetable[dayOfWeek - 1]; // Lunes es 1, usamos índice 0
            daySchedule.forEach((sub, i) => {
                if (sub && sub !== 'COMEDOR') {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = "text-left p-2 border rounded-lg hover:border-blue-500 transition-all slot-btn";
                    btn.innerHTML = `<div class="text-[8px] text-slate-400 font-bold">${timeLabels[i]}</div><div class="text-[10px] font-bold truncate">${sub}</div>`;
                    btn.onclick = () => {
                        document.getElementById('input-subject').value = sub;
                        document.getElementById('input-time').value = timeLabels[i];
                        document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('bg-blue-50', 'border-blue-500'));
                        btn.classList.add('bg-blue-50', 'border-blue-500');
                    };
                    slotsDiv.appendChild(btn);
                }
            });
        }

        function saveEvent(e) {
            e.preventDefault();
            const newEvent = {
                id: Date.now().toString(),
                date: document.getElementById('input-date').value,
                type: document.getElementById('input-type').value,
                subject: document.getElementById('input-subject').value,
                time: document.getElementById('input-time').value,
                title: document.getElementById('input-title').value
            };
            
            events.push(newEvent);
            localStorage.setItem('agenda3A_v2', JSON.stringify(events));
            closeModal();
            render();
        }

        function deleteEvent(id) {
            if (confirm('¿Borrar esta actividad?')) {
                events = events.filter(e => e.id !== id);
                localStorage.setItem('agenda3A_v2', JSON.stringify(events));
                render();
            }
        }

        // --- NAVEGACIÓN Y UTILIDADES ---
        function switchView(v) {
            currentView = v;
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('btn-active', 'text-white'));
            document.getElementById(`btn-${v}`).classList.add('btn-active');
            render();
        }

        function navigate(dir) {
            if (currentView === 'month') viewDate.setMonth(viewDate.getMonth() + dir);
            else if (currentView === 'week') viewDate.setDate(viewDate.getDate() + (dir * 7));
            render();
        }

        function goToToday() {
            viewDate = new Date();
            render();
        }

        function getStartOfWeek(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.setDate(diff));
        }

        function getEventColor(type) {
            if (type === 'prueba') return 'bg-red-100 text-red-700 border-red-200';
            if (type === 'tp') return 'bg-blue-100 text-blue-700 border-blue-200';
            return 'bg-amber-100 text-amber-700 border-amber-200';
        }

        function openModal(date = '') {
            document.getElementById('modal').classList.remove('hidden');
            if (date) {
                document.getElementById('input-date').value = date;
                updateTimeOptions();
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('input-title').value = '';
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
