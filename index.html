<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda 3RO A - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .bg-math { background-color: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
        .bg-lengua { background-color: #fefce8; color: #a16207; border-color: #fef08a; }
        .bg-ingles { background-color: #faf5ff; color: #7e22ce; border-color: #e9d5ff; }
        .bg-bio { background-color: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
        .bg-fisico { background-color: #fff7ed; color: #c2410c; border-color: #fed7aa; }
        .bg-historia { background-color: #ffedd5; color: #9a3412; border-color: #fdba74; }
        .bg-construccion { background-color: #f1f5f9; color: #475569; border-color: #cbd5e1; }
        .bg-tecno { background-color: #ecfeff; color: #0e7490; border-color: #a5f3fc; }
        .bg-teatro { background-color: #fef2f2; color: #b91c1c; border-color: #fecaca; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }
        .modal-active .modal-content { transform: scale(1); }
        .modal:not(.modal-active) .modal-content { transform: scale(0.95); }
        .toast { transform: translateY(100px); opacity: 0; transition: all 0.3s ease; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .loading-overlay { background: rgba(255,255,255,0.95); }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay fixed inset-0 z-50 flex items-center justify-center transition-opacity duration-300">
        <div class="text-center">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-600 mb-3"></i>
            <p class="text-sm font-medium text-slate-600">Sincronizando con Google Sheets...</p>
            <p class="text-xs text-slate-400 mt-2">3RO A - Colegio Fasta San Vicente de Paúl</p>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-4 py-3 flex flex-col gap-3 shadow-sm z-20 no-print">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm shadow-sm">3A</div>
                <div>
                    <h1 class="text-sm font-bold text-slate-900 leading-tight">Agenda Escolar</h1>
                    <p class="text-[10px] text-slate-500 font-medium">2026 | <span id="sync-status" class="text-green-600">● En línea</span></p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="syncData()" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 active:scale-95 transition-transform" title="Sincronizar">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <button onclick="exportData()" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 active:scale-95 transition-transform" title="Exportar">
                    <i class="fa-solid fa-download"></i>
                </button>
                <label class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 active:scale-95 transition-transform cursor-pointer" title="Importar">
                    <i class="fa-solid fa-upload"></i>
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(this)">
                </label>
                <button onclick="openModal()" class="bg-indigo-600 text-white w-9 h-9 rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center bg-slate-50 p-1 rounded-xl border border-slate-200">
            <button onclick="changeDate(-1)" class="w-8 h-8 flex items-center justify-center text-slate-500 active:bg-slate-200 rounded-lg"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="flex bg-white rounded-lg p-0.5 shadow-sm border border-slate-200">
                <button onclick="switchView('month')" id="btn-month" class="px-3 py-1.5 text-[10px] font-bold rounded-md transition-all bg-indigo-50 text-indigo-600">Mes</button>
                <button onclick="switchView('week')" id="btn-week" class="px-3 py-1.5 text-[10px] font-bold rounded-md transition-all text-slate-500">Sem</button>
                <button onclick="switchView('list')" id="btn-list" class="px-3 py-1.5 text-[10px] font-bold rounded-md transition-all text-slate-500">Lista</button>
            </div>
            <button onclick="changeDate(1)" class="w-8 h-8 flex items-center justify-center text-slate-500 active:bg-slate-200 rounded-lg"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        
        <div class="text-center">
            <h2 id="current-date-display" class="text-sm font-bold text-slate-800">Enero 2026</h2>
            <button onclick="goToToday()" class="text-[10px] text-indigo-600 font-medium mt-0.5">Ir a Hoy</button>
        </div>
    </header>

    <!-- Mobile Filter Bar -->
    <div class="absolute top-0 left-0 right-0 bg-white border-b border-slate-200 z-10 shadow-sm" style="top: 140px;" id="mobile-filter-bar">
        <div class="flex overflow-x-auto hide-scrollbar p-3 gap-2">
            <button onclick="resetFilters()" class="flex-shrink-0 px-3 py-1.5 bg-slate-100 text-slate-600 rounded-full text-xs font-bold border border-slate-200">Todas</button>
            <div id="subject-filters-mobile" class="flex gap-2"></div>
        </div>
    </div>

    <!-- Main Calendar -->
    <main class="flex-1 overflow-y-auto bg-slate-50 p-4 relative pt-20" id="calendar-main" style="padding-top: 160px;">
        <div id="calendar-content" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-[500px]"></div>
        <div class="h-20 md:hidden"></div>
    </main>

    <!-- Modal -->
    <div id="event-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-end md:items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="modal-content bg-white w-full md:max-w-2xl md:rounded-xl shadow-2xl z-50 overflow-hidden flex flex-col md:max-h-[90vh] h-[95vh] md:h-auto">
            <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i class="fa-regular fa-calendar-plus text-indigo-600"></i> Nueva Actividad
                </h3>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-500 shadow-sm"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-4 overflow-y-auto flex-1">
                <form id="event-form" onsubmit="handleFormSubmit(event)">
                    <input type="hidden" id="event-date">
                    <input type="hidden" id="event-id">
                    
                    <div class="mb-6">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Tipo</label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="prueba" class="peer sr-only" checked onchange="toggleModality(true)">
                                <div class="p-2 text-center border-2 border-slate-100 rounded-xl peer-checked:border-red-500 peer-checked:bg-red-50 transition-all">
                                    <i class="fa-solid fa-pen-to-square text-lg text-slate-400 peer-checked:text-red-500 mb-1 block"></i>
                                    <span class="text-[10px] font-bold text-slate-600 peer-checked:text-red-700 block">Prueba</span>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="tp" class="peer sr-only" onchange="toggleModality(false)">
                                <div class="p-2 text-center border-2 border-slate-100 rounded-xl peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                                    <i class="fa-solid fa-folder-open text-lg text-slate-400 peer-checked:text-blue-500 mb-1 block"></i>
                                    <span class="text-[10px] font-bold text-slate-600 peer-checked:text-blue-700 block">TP</span>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="obligacion" class="peer sr-only" onchange="toggleModality(false)">
                                <div class="p-2 text-center border-2 border-slate-100 rounded-xl peer-checked:border-amber-500 peer-checked:bg-amber-50 transition-all">
                                    <i class="fa-solid fa-bell text-lg text-slate-400 peer-checked:text-amber-500 mb-1 block"></i>
                                    <span class="text-[10px] font-bold text-slate-600 peer-checked:text-amber-700 block">Oblig.</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Materia</label>
                            <select id="event-subject" required onchange="updateTimeSlots()" class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-sm"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1">Horario</label>
                            <select id="event-time" class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-sm"></select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-bold text-slate-700 mb-1">Título</label>
                        <input type="text" id="event-title" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm" placeholder="Ej: Ecuaciones de 2do grado">
                    </div>

                    <div id="modality-group" class="mb-4 bg-slate-50 p-3 rounded-lg border border-slate-200">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Modalidad</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="modality" value="escrita" checked class="text-indigo-600 w-4 h-4">
                                <span class="text-sm font-medium text-slate-700">Escrita</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="modality" value="oral" class="text-indigo-600 w-4 h-4">
                                <span class="text-sm font-medium text-slate-700">Oral</span>
                            </label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-bold text-slate-700 mb-1">Temas a Estudiar</label>
                        <textarea id="event-topics" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm" placeholder="Unidad 1, 2, 3..."></textarea>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full py-3 text-sm font-bold text-white bg-indigo-600 rounded-xl shadow-lg active:scale-[0.98] transition-transform">
                        <i class="fa-solid fa-cloud-arrow-up mr-2"></i>Guardar en Google Sheets
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg z-50 flex items-center gap-2">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-message">Operación exitosa</span>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN - TU URL DE GOOGLE SCRIPT
        // ============================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4shbJRTlAkUYjr3gMd2HBFP4Ox8PlRNexE-E3HeHmhXhpQkYGsFS2gbNaxl0ZWGU/exec';
        
        // ============================================
        // DATOS DE LA APP
        // ============================================
        const subjectsConfig = {
            'MATEMATICA': { color: 'bg-math', icon: 'fa-calculator', label: 'Matemática' },
            'MATEMÁTICA': { color: 'bg-math', icon: 'fa-calculator', label: 'Matemática' },
            'PDL': { color: 'bg-lengua', icon: 'fa-book-open', label: 'PDL' },
            'INGLÉS': { color: 'bg-ingles', icon: 'fa-globe', label: 'Inglés' },
            'BIOLOGÍA': { color: 'bg-bio', icon: 'fa-microscope', label: 'Biología' },
            'FISÍCO QUÍMICA': { color: 'bg-fisico', icon: 'fa-flask', label: 'Físico Química' },
            'HISTORIA': { color: 'bg-historia', icon: 'fa-landmark', label: 'Historia' },
            'GEOGRAFÍA': { color: 'bg-historia', icon: 'fa-compass', label: 'Geografía' },
            'FOR DOC': { color: 'bg-construccion', icon: 'fa-scale-balanced', label: 'For Doc' },
            'CONSTRUCCIÓN': { color: 'bg-construccion', icon: 'fa-trowel-bricks', label: 'Construcción' },
            'TECNOLOGIA': { color: 'bg-tecno', icon: 'fa-microchip', label: 'Tecnología' },
            'TEATRO': { color: 'bg-teatro', icon: 'fa-masks-theater', label: 'Teatro' },
            'ED FÍSICA': { color: 'bg-teatro', icon: 'fa-person-running', label: 'Ed. Física' },
            'TUTORIA': { color: 'bg-construccion', icon: 'fa-user-group', label: 'Tutoría' },
            'COMEDOR': { color: 'bg-construccion', icon: 'fa-utensils', label: 'Comedor' }
        };

        const timetable = [
            ['GEOGRAFÍA', 'BIOLOGÍA', 'CONSTRUCCIÓN', 'HISTORIA', '', 'ED FÍSICA', '', '', '', '', ''], 
            ['MATEMATICA', 'GEOGRAFÍA', 'FOR DOC', 'PDL', 'BIOLOGÍA', 'FISÍCO QUÍMICA', '', '', '', '', ''], 
            ['FOR DOC', 'MATEMÁTICA', 'PDL', 'INGLÉS', 'TUTORIA', 'COMEDOR', '', 'TECNOLOGIA', 'TECNOLOGIA', '', ''], 
            ['MATEMÁTICA', 'MATEMATICA', 'TEATRO', 'PDL', 'FISÍCO QUÍMICA', 'TUTORIA', 'TUTORIA', '', '', '', ''], 
            ['TEATRO', 'PDL', 'CONSTRUCCIÓN', 'HISTORIA', 'INGLÉS', 'ED FÍSICA', '', '', '', '', ''] 
        ];

        const timeLabels = ['07:40', '08:40', '09:55', '11:05', '12:05', '13:15', '14:30', '14:00', '14:40', '15:30', '16:10'];

        let currentDate = new Date(2026, 0, 1); 
        let currentView = 'month';
        let events = []; 
        let activeFilter = null;
        let isLoading = false;

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            renderSubjectFilters();
            populateSubjectDropdown();
            loadDataFromGoogleSheets();
        });

        // ============================================
        // GOOGLE SHEETS API
        // ============================================
        
        async function loadDataFromGoogleSheets() {
            showLoading(true);
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'GET',
                    mode: 'no-cors'
                });
                
                // Con no-cors no podemos leer la respuesta directamente
                // Usamos localStorage como fallback y cache
                const localData = localStorage.getItem('agenda3roa_events');
                if (localData) {
                    events = JSON.parse(localData);
                    renderCalendar();
                    showToast('Datos cargados desde cache', 'success');
                } else {
                    renderCalendar();
                    showToast('Sin datos previos', 'warning');
                }
                
                updateSyncStatus(true);
            } catch (error) {
                console.error('Error cargando datos:', error);
                const localData = localStorage.getItem('agenda3roa_events');
                if (localData) {
                    events = JSON.parse(localData);
                }
                updateSyncStatus(false);
                showToast('Usando datos locales', 'warning');
            } finally {
                showLoading(false);
                renderCalendar();
            }
        }

        async function saveToGoogleSheets(eventData, action = 'create') {
            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Guardando...';
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: action,
                        ...eventData
                    })
                });
                
                // Guardar en localStorage como backup
                if (action === 'create') {
                    events.push(eventData);
                } else if (action === 'update') {
                    const index = events.findIndex(e => e.id === eventData.id);
                    if (index !== -1) events[index] = eventData;
                } else if (action === 'delete') {
                    events = events.filter(e => e.id !== eventData.id);
                }
                
                localStorage.setItem('agenda3roa_events', JSON.stringify(events));
                
                showToast(action === 'delete' ? 'Eliminado correctamente' : 'Guardado en Google Sheets', 'success');
                closeModal();
                renderCalendar();
                
            } catch (error) {
                console.error('Error guardando:', error);
                showToast('Error al guardar. Verifica tu conexión.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }

        async function syncData() {
            showLoading(true);
            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'GET', mode: 'no-cors' });
                showToast('Sincronización completada', 'success');
                updateSyncStatus(true);
            } catch (error) {
                showToast('Error de sincronización', 'error');
                updateSyncStatus(false);
            } finally {
                showLoading(false);
                renderCalendar();
            }
        }

        function updateSyncStatus(online) {
            const status = document.getElementById('sync-status');
            if (online) {
                status.innerHTML = '● En línea';
                status.className = 'text-green-600';
            } else {
                status.innerHTML = '● Offline';
                status.className = 'text-amber-600';
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(events, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `agenda-3roa-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Datos exportados', 'success');
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    events = imported;
                    localStorage.setItem('agenda3roa_events', JSON.stringify(events));
                    renderCalendar();
                    showToast('Datos importados correctamente', 'success');
                } catch (error) {
                    showToast('Error al importar archivo', 'error');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        // ============================================
        // UI FUNCTIONS
        // ============================================
        
        function showLoading(show) {
            const overlay = document.getElementById('loading-overlay');
            if (show) {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const icon = document.getElementById('toast-icon');
            
            toastMessage.textContent = message;
            
            if (type === 'success') {
                icon.className = 'fa-solid fa-circle-check text-green-400';
            } else if (type === 'error') {
                icon.className = 'fa-solid fa-circle-exclamation text-red-400';
            } else if (type === 'warning') {
                icon.className = 'fa-solid fa-triangle-exclamation text-amber-400';
            }
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function switchView(view) {
            currentView = view;
            ['month', 'week', 'list'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if(v === view) {
                    btn.classList.add('bg-indigo-50', 'text-indigo-600');
                    btn.classList.remove('text-slate-500');
                } else {
                    btn.classList.remove('bg-indigo-50', 'text-indigo-600');
                    btn.classList.add('text-slate-500');
                }
            });
            renderCalendar();
        }

        function changeDate(direction) {
            if (currentView === 'month' || currentView === 'list') {
                currentDate.setMonth(currentDate.getMonth() + direction);
            } else if (currentView === 'week') {
                currentDate.setDate(currentDate.getDate() + (direction * 7));
            }
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        function renderSubjectFilters() {
            const mobileContainer = document.getElementById('subject-filters-mobile');
            const uniqueSubjects = [...new Set(Object.keys(subjectsConfig))].sort();
            
            const html = uniqueSubjects.map(sub => {
                const config = subjectsConfig[sub];
                const colorClass = config.color.split(' ')[0]; 
                const isActive = activeFilter === sub;
                const activeClass = isActive ? 'ring-2 ring-indigo-500 bg-slate-100' : 'bg-white border-slate-200';
                
                return `
                <button onclick="toggleSubjectFilter('${sub}')" class="flex-shrink-0 flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold border transition-all ${activeClass}">
                    <div class="w-2 h-2 rounded-full ${colorClass.replace('bg-', 'bg-')}"></div>
                    <span class="${isActive ? 'text-indigo-700' : 'text-slate-600'}">${config.label}</span>
                </button>
            `}).join('');

            if(mobileContainer) mobileContainer.innerHTML = html;
        }

        function toggleSubjectFilter(subject) {
            activeFilter = activeFilter === subject ? null : subject;
            renderSubjectFilters();
            renderCalendar();
        }

        function resetFilters() {
            activeFilter = null;
            renderSubjectFilters();
            renderCalendar();
        }

        function populateSubjectDropdown() {
            const select = document.getElementById('event-subject');
            const uniqueSubjects = [...new Set(Object.keys(subjectsConfig))].sort();
            select.innerHTML = '<option value="">Seleccionar...</option>' + 
                uniqueSubjects.map(sub => `<option value="${sub}">${subjectsConfig[sub].label}</option>`).join('');
        }

        function updateTimeSlots() {
            const subject = document.getElementById('event-subject').value;
            const timeSelect = document.getElementById('event-time');
            timeSelect.innerHTML = '<option value="">Seleccionar Horario...</option>';

            if (!subject) return;

            const dayNames = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie'];
            let options = [];

            timetable.forEach((daySlots, dayIndex) => {
                daySlots.forEach((slotSubject, slotIndex) => {
                    if (slotSubject === subject) {
                        options.push({
                            label: `${dayNames[dayIndex]} ${timeLabels[slotIndex]}`,
                            value: `${dayIndex}-${slotIndex}`
                        });
                    }
                });
            });

            if(options.length === 0) {
                timeSelect.innerHTML = '<option disabled>Sin horario</option>';
            } else {
                options.forEach(opt => {
                    const el = document.createElement('option');
                    el.value = opt.value;
                    el.textContent = opt.label;
                    timeSelect.appendChild(el);
                });
            }
        }

        function toggleModality(show) {
            document.getElementById('modality-group').style.display = show ? 'block' : 'none';
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-content');
            const dateDisplay = document.getElementById('current-date-display');
            
            const options = { year: 'numeric', month: 'long' };
            dateDisplay.textContent = currentDate.toLocaleDateString('es-ES', options).replace(/^\w/, c => c.toUpperCase());

            if (currentView === 'month') renderMonthView(container);
            else if (currentView === 'week') renderWeekView(container);
            else if (currentView === 'list') renderListView(container);
        }

        function getEventsForDate(date) {
            const dateStr = date.toISOString().split('T')[0];
            let dayEvents = events.filter(e => e.fecha === dateStr || e.date === dateStr);
            if (activeFilter) {
                dayEvents = dayEvents.filter(e => e.materia === activeFilter || e.subject === activeFilter);
            }
            return dayEvents;
        }

        function renderMonthView(container) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay(); 
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;

            let html = `
                <div class="grid grid-cols-7 border-b border-slate-200 bg-slate-50">
                    ${['L', 'M', 'M', 'J', 'V', 'S', 'D'].map(d => 
                        `<div class="py-2 text-center text-[10px] font-bold text-slate-400 uppercase">${d}</div>`
                    ).join('')}
                </div>
                <div class="grid grid-cols-7 auto-rows-fr bg-slate-200 gap-px border-b border-slate-200">
            `;

            for (let i = 0; i < startOffset; i++) {
                html += `<div class="bg-white min-h-[80px]"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const currentDayDate = new Date(year, month, d);
                const dayEvents = getEventsForDate(currentDayDate);
                const isToday = new Date().toDateString() === currentDayDate.toDateString();
                
                html += `
                    <div class="bg-white min-h-[80px] p-1.5 relative active:bg-slate-50" onclick="openModal('${currentDayDate.toISOString().split('T')[0]}')">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-xs font-bold ${isToday ? 'bg-indigo-600 text-white w-5 h-5 flex items-center justify-center rounded-full' : 'text-slate-700'}">${d}</span>
                        </div>
                        <div class="space-y-1 overflow-y-auto max-h-[50px] hide-scrollbar">
                            ${dayEvents.slice(0, 4).map(e => {
                                let badgeColor = 'bg-slate-100 text-slate-600';
                                const tipo = e.tipo || e.type;
                                if(tipo === 'prueba') badgeColor = 'bg-red-100 text-red-700';
                                if(tipo === 'tp') badgeColor = 'bg-blue-100 text-blue-700';
                                if(tipo === 'obligacion') badgeColor = 'bg-amber-100 text-amber-700';
                                
                                const titulo = e.titulo || e.title;
                                return `
                                    <div class="text-[9px] px-1 py-0.5 rounded ${badgeColor} truncate font-semibold">
                                        ${titulo}
                                    </div>
                                `;
                            }).join('')}
                            ${dayEvents.length > 4 ? `<div class="text-[9px] text-slate-400 text-center">+${dayEvents.length - 4}</div>` : ''}
                        </div>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderWeekView(container) {
            const startOfWeek = new Date(currentDate);
            const day = startOfWeek.getDay() || 7; 
            if(day !== 1) startOfWeek.setHours(-24 * (day - 1));

            const weekDays = [];
            for(let i=0; i<7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(startOfWeek.getDate() + i);
                weekDays.push(d);
            }

            let html = `
                <div class="overflow-x-auto pb-4">
                    <div class="min-w-[600px]">
                        <div class="grid grid-cols-8 border-b border-slate-200 bg-slate-50 sticky top-0 z-10">
                            <div class="p-2 text-[10px] font-bold text-slate-500 border-r border-slate-200">Hora</div>
                            ${weekDays.map(d => {
                                const isToday = new Date().toDateString() === d.toDateString();
                                return `
                                    <div class="p-2 text-center border-r border-slate-200 ${isToday ? 'bg-indigo-50' : ''}">
                                        <div class="text-[10px] font-bold text-slate-500 uppercase">${d.toLocaleDateString('es-ES', { weekday: 'short' })}</div>
                                        <div class="text-sm font-bold ${isToday ? 'text-indigo-600' : 'text-slate-800'}">${d.getDate()}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <div class="flex flex-col">
            `;

            const slotsToRender = [0, 1, 2, 3, 4, 5, 7, 8, 9, 10]; 

            slotsToRender.forEach(slotIdx => {
                html += `
                    <div class="grid grid-cols-8 border-b border-slate-100 min-h-[50px]">
                        <div class="p-1 text-[10px] text-slate-400 border-r border-slate-200 bg-slate-50 flex flex-col justify-center items-center">
                            <span>${timeLabels[slotIdx]}</span>
                        </div>
                        ${weekDays.map((dayDate, dayIdx) => {
                            if(dayIdx > 4) return `<div class="border-r border-slate-100 bg-slate-50/30"></div>`; 

                            const subject = timetable[dayIdx][slotIdx];
                            const dayEvents = getEventsForDate(dayDate).filter(e => {
                                if(e.horario || e.timeSlot) {
                                    const slot = e.horario || e.timeSlot;
                                    const [eDay, eSlot] = slot.split('-').map(Number);
                                    return eDay === dayIdx && eSlot === slotIdx;
                                }
                                return false; 
                            });

                            let cellContent = '';
                            if(subject) {
                                const config = subjectsConfig[subject];
                                cellContent = `
                                    <div class="h-full w-full flex flex-col items-center justify-center p-0.5 text-center opacity-40">
                                        <i class="fa-solid ${config.icon} ${config.color.split(' ')[1]} text-xs mb-0.5"></i>
                                    </div>
                                `;
                            }

                            let eventBadges = '';
                            if(dayEvents.length > 0) {
                                eventBadges = `<div class="absolute inset-0 flex flex-col justify-center items-center gap-1 p-1 z-10 pointer-events-none">
                                    ${dayEvents.map(e => {
                                        let color = (e.tipo || e.type) === 'prueba' ? 'bg-red-500' : ((e.tipo || e.type) === 'tp' ? 'bg-blue-500' : 'bg-amber-500');
                                        const titulo = e.titulo || e.title;
                                        return `<div class="${color} text-white text-[9px] px-1.5 py-0.5 rounded shadow-sm whitespace-nowrap max-w-full truncate">
                                            ${titulo}
                                        </div>`
                                    }).join('')}
                                </div>`;
                            }

                            return `
                                <div class="border-r border-slate-100 relative hover:bg-slate-50" onclick="openModal('${dayDate.toISOString().split('T')[0]}', ${dayIdx}, ${slotIdx})">
                                    ${cellContent}
                                    ${eventBadges}
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            });

            html += `</div></div></div>`;
            container.innerHTML = html;
        }

        function renderListView(container) {
            const monthStart = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            const monthEnd = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
            
            let monthEvents = events.filter(e => {
                const eDate = new Date(e.fecha || e.date);
                return eDate >= monthStart && eDate <= monthEnd;
            });

            if(activeFilter) {
                monthEvents = monthEvents.filter(e => (e.materia || e.subject) === activeFilter);
            }

            monthEvents.sort((a,b) => new Date(a.fecha || a.date) - new Date(b.fecha || b.date));

            if(monthEvents.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-48 text-slate-400 p-4 text-center"><i class="fa-regular fa-calendar-xmark text-4xl mb-2"></i><p class="text-sm">No hay actividades este mes.</p></div>`;
                return;
            }

            let html = `<div class="divide-y divide-slate-100">`;

            monthEvents.forEach(e => {
                const dateObj = new Date(e.fecha || e.date);
                const dateStr = dateObj.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
                const tipo = e.tipo || e.type;
                const materia = e.materia || e.subject;
                const titulo = e.titulo || e.title;
                
                let typeIcon = '';
                let typeColor = '';
                if(tipo === 'prueba') { typeIcon = 'fa-pen-to-square'; typeColor = 'text-red-500 bg-red-50'; }
                if(tipo === 'tp') { typeIcon = 'fa-folder-open'; typeColor = 'text-blue-500 bg-blue-50'; }
                if(tipo === 'obligacion') { typeIcon = 'fa-bell'; typeColor = 'text-amber-500 bg-amber-50'; }

                const config = subjectsConfig[materia] || { color: 'bg-gray-100', text: 'text-gray-800', icon: 'fa-book' };

                html += `
                    <div class="p-4 flex items-start gap-3 active:bg-slate-50">
                        <div class="flex flex-col items-center justify-center w-12 h-12 bg-slate-50 rounded-lg border border-slate-200 flex-shrink-0">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">${dateObj.toLocaleDateString('es-ES', { month: 'short' })}</span>
                            <span class="text-lg font-bold text-slate-800 leading-none">${dateObj.getDate()}</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start">
                                <h4 class="text-sm font-bold text-slate-800 truncate pr-2">${titulo}</h4>
                                <button onclick="deleteEvent('${e.id}')" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="subject-badge inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium ${config.color} ${config.text}">
                                    ${materia}
                                </span>
                                <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold ${typeColor}">
                                    <i class="fa-solid ${typeIcon} mr-1"></i> ${tipo.toUpperCase()}
                                </span>
                            </div>
                            ${e.temas || e.topics ? `<p class="text-xs text-slate-500 mt-1 truncate">${e.temas || e.topics}</p>` : ''}
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        function openModal(dateStr = null, dayIdx = null, slotIdx = null) {
            const modal = document.getElementById('event-modal');
            const form = document.getElementById('event-form');
            
            form.reset();
            document.getElementById('modality-group').style.display = 'block';
            
            const targetDate = dateStr ? dateStr : currentDate.toISOString().split('T')[0];
            document.getElementById('event-date').value = targetDate;
            document.getElementById('event-id').value = '';
            document.getElementById('event-time').innerHTML = '<option value="">Seleccionar Horario...</option>';

            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.classList.add('modal-active');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            const modal = document.getElementById('event-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.classList.remove('modal-active');
            document.body.classList.remove('modal-active');
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            
            const eventData = {
                id: document.getElementById('event-id').value || Date.now().toString(),
                fecha: document.getElementById('event-date').value,
                materia: document.getElementById('event-subject').value,
                tipo: document.querySelector('input[name="type"]:checked').value,
                titulo: document.getElementById('event-title').value,
                modalidad: document.querySelector('input[name="modality"]:checked')?.value,
                temas: document.getElementById('event-topics').value,
                horario: document.getElementById('event-time').value,
                archivo: '',
                done: false
            };

            const eventId = document.getElementById('event-id').value;
            saveToGoogleSheets(eventData, eventId ? 'update' : 'create');
        }

        function deleteEvent(id) {
            if(confirm('¿Eliminar esta actividad?')) {
                saveToGoogleSheets({ id: id }, 'delete');
            }
        }
    </script>
</body>
</html>
</html>
