<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Agenda 3RO A | Colegio Fasta San Vicente de Paúl</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
        body { background-color: #f8fafc; min-height: 100dvh; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Subject Styles */
        .bg-math { background-color: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .bg-lengua { background-color: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .bg-ingles { background-color: #e9d5ff; color: #6b21a8; border: 1px solid #d8b4fe; }
        .bg-bio { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .bg-fisico { background-color: #fed7aa; color: #c2410c; border: 1px solid #fdba74; }
        .bg-historia { background-color: #ffedd5; color: #9a3412; border: 1px solid #fdba74; }
        .bg-construccion { background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .bg-tecno { background-color: #cffafe; color: #0e7490; border: 1px solid #a5f3fc; }
        .bg-teatro { background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .bg-comedor { background-color: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        
        .event-prueba { background-color: #fee2e2; border-left: 4px solid #ef4444; }
        .event-tp { background-color: #dbeafe; border-left: 4px solid #3b82f6; }
        .event-obligacion { background-color: #fef3c7; border-left: 4px solid #f59e0b; }
        
        .modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-active .modal-content { transform: scale(1); }
        .modal:not(.modal-active) .modal-content { transform: scale(0.95); }
        
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .btn-press:active { transform: scale(0.96); transition: transform 0.1s; }
        .calendar-cell { min-height: 100px; }
        @media (max-width: 640px) { .calendar-cell { min-height: 80px; } }
    </style>
</head>
<body class="text-slate-800">

    <div id="loading-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-white transition-opacity duration-500">
        <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-4 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg spinner">
                <i class="fa-solid fa-calendar-check text-3xl text-white"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">Cargando Agenda 3A</h1>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] space-y-2 w-full max-w-sm px-4"></div>

    <div id="app" class="flex flex-col h-screen hidden">
        <div class="flex flex-1 overflow-hidden">
            
            <aside class="hidden lg:flex flex-col w-72 bg-white border-r border-slate-200">
                <div class="p-6 border-b border-slate-100 flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">3A</div>
                    <div>
                        <h1 class="font-bold text-slate-800 leading-tight">Agenda Escolar</h1>
                        <p class="text-xs text-slate-500">2026 | Fasta SVDP</p>
                    </div>
                </div>
                
                <div class="p-4 bg-blue-50/50 border-b border-slate-100 grid grid-cols-3 gap-2">
                    <div class="text-center p-2 bg-white rounded-lg shadow-sm">
                        <div class="text-lg font-bold text-red-500" id="stat-pruebas">0</div>
                        <div class="text-[9px] text-slate-400 uppercase font-bold">Pruebas</div>
                    </div>
                    <div class="text-center p-2 bg-white rounded-lg shadow-sm">
                        <div class="text-lg font-bold text-blue-500" id="stat-tps">0</div>
                        <div class="text-[9px] text-slate-400 uppercase font-bold">TPs</div>
                    </div>
                    <div class="text-center p-2 bg-white rounded-lg shadow-sm">
                        <div class="text-lg font-bold text-amber-500" id="stat-obligaciones">0</div>
                        <div class="text-[9px] text-slate-400 uppercase font-bold">Oblig.</div>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-4 space-y-4">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Filtrar Materia</h3>
                    <div id="subject-filters-desktop" class="space-y-1"></div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col overflow-hidden">
                <header class="bg-white border-b border-slate-200 px-4 py-3 lg:px-6 lg:py-4">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2 lg:gap-4">
                            <button onclick="changeDate(-1)" class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-slate-100 btn-press text-slate-500"><i class="fa-solid fa-chevron-left"></i></button>
                            <div class="text-center lg:text-left">
                                <h2 id="current-date-display-desktop" class="text-lg lg:text-xl font-bold text-slate-800">Marzo 2026</h2>
                                <button onclick="goToToday()" class="text-[10px] lg:text-xs text-blue-600 font-bold hover:underline">Ir a hoy</button>
                            </div>
                            <button onclick="changeDate(1)" class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-slate-100 btn-press text-slate-500"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <div class="hidden md:flex bg-slate-100 p-1 rounded-xl">
                                <button onclick="switchView('month')" id="btn-month" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all">Mes</button>
                                <button onclick="switchView('week')" id="btn-week" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500">Semana</button>
                                <button onclick="switchView('list')" id="btn-list" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500">Lista</button>
                            </div>
                            <button onclick="openCreateModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-200 btn-press flex items-center gap-2">
                                <i class="fa-solid fa-plus"></i><span class="hidden sm:inline">Nueva</span>
                            </button>
                        </div>
                    </div>
                </header>

                <div class="flex-1 overflow-y-auto p-4 lg:p-6 bg-slate-50" id="calendar-main">
                    <div id="calendar-content" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"></div>
                </div>
            </main>
        </div>
    </div>

    <div id="event-modal" class="modal opacity-0 pointer-events-none fixed inset-0 z-50 flex items-end lg:items-center justify-center p-0 lg:p-4">
        <div class="modal-overlay absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="modal-content bg-white w-full lg:max-w-xl lg:rounded-2xl shadow-2xl z-50 overflow-hidden flex flex-col h-[90vh] lg:h-auto">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <h3 class="font-bold text-slate-800" id="modal-title">Nueva Actividad</h3>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6">
                <form id="event-form" onsubmit="handleFormSubmit(event)" class="space-y-5">
                    <input type="hidden" id="event-id">
                    
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Tipo de Actividad</label>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="prueba" class="peer sr-only" checked onchange="toggleModality(true)">
                                <div class="p-3 text-center border-2 rounded-xl peer-checked:border-red-500 peer-checked:bg-red-50 transition-all">
                                    <i class="fa-solid fa-pen-to-square mb-1 block text-slate-400 peer-checked:text-red-500"></i>
                                    <span class="text-[10px] font-bold text-slate-600">Prueba</span>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="tp" class="peer sr-only" onchange="toggleModality(false)">
                                <div class="p-3 text-center border-2 rounded-xl peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                                    <i class="fa-solid fa-folder-open mb-1 block text-slate-400 peer-checked:text-blue-500"></i>
                                    <span class="text-[10px] font-bold text-slate-600">TP</span>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="type" value="obligacion" class="peer sr-only" onchange="toggleModality(false)">
                                <div class="p-3 text-center border-2 rounded-xl peer-checked:border-amber-500 peer-checked:bg-amber-50 transition-all">
                                    <i class="fa-solid fa-bell mb-1 block text-slate-400 peer-checked:text-amber-500"></i>
                                    <span class="text-[10px] font-bold text-slate-600">Obligación</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Fecha</label>
                            <input type="date" id="event-date-input" required onchange="onDateChange()" class="w-full px-4 py-2.5 border-2 border-slate-100 rounded-xl focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Materia</label>
                            <select id="event-subject" required onchange="updateTimeSlots()" class="w-full px-4 py-2.5 border-2 border-slate-100 rounded-xl focus:border-blue-500 outline-none bg-white"></select>
                        </div>
                    </div>

                    <div id="day-schedule-preview" class="hidden p-3 bg-slate-50 rounded-xl border border-slate-200">
                        <label class="block text-[9px] font-bold text-slate-400 uppercase mb-2">Seleccionar Horario del día</label>
                        <div id="schedule-slots" class="grid grid-cols-2 gap-2"></div>
                        <input type="hidden" id="event-time">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Título de la actividad</label>
                        <input type="text" id="event-title" required class="w-full px-4 py-2.5 border-2 border-slate-100 rounded-xl focus:border-blue-500 outline-none" placeholder="Ej: Examen de Celulas">
                    </div>

                    <div id="modality-group" class="p-3 bg-red-50 rounded-xl border border-red-100 flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer text-xs font-bold text-red-700">
                            <input type="radio" name="modality" value="escrita" checked> Escrita
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer text-xs font-bold text-red-700">
                            <input type="radio" name="modality" value="oral"> Oral
                        </label>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Temas / Descripción</label>
                        <textarea id="event-topics" rows="3" class="w-full px-4 py-2.5 border-2 border-slate-100 rounded-xl focus:border-blue-500 outline-none resize-none" placeholder="¿Qué entra en la prueba?"></textarea>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Link a Material (Drive)</label>
                        <input type="url" id="event-file-url" class="w-full px-4 py-2.5 border-2 border-slate-100 rounded-xl focus:border-blue-500 outline-none" placeholder="https://drive.google.com/...">
                    </div>

                    <button type="submit" id="submit-btn" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg btn-press">
                        Guardar Actividad
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4shbJRTlAkUYjr3gMd2HBFP4Ox8PlRNexE-E3HeHmhXhpQkYGsFS2gbNaxl0ZWGU/exec';
        
        const subjectsConfig = {
            'MATEMATICA': { color: 'bg-math', icon: 'fa-calculator', label: 'Matemática' },
            'MATEMÁTICA': { color: 'bg-math', icon: 'fa-calculator', label: 'Matemática' },
            'PDL': { color: 'bg-lengua', icon: 'fa-book-open', label: 'PDL' },
            'INGLÉS': { color: 'bg-ingles', icon: 'fa-globe', label: 'Inglés' },
            'BIOLOGÍA': { color: 'bg-bio', icon: 'fa-microscope', label: 'Biología' },
            'FISÍCO QUÍMICA': { color: 'bg-fisico', icon: 'fa-flask', label: 'Físico Química' },
            'HISTORIA': { color: 'bg-historia', icon: 'fa-landmark', label: 'Historia' },
            'GEOGRAFÍA': { color: 'bg-historia', icon: 'fa-compass', label: 'Geografía' },
            'FOR DOC': { color: 'bg-construccion', icon: 'fa-scale-balanced', label: 'For Doc' },
            'CONSTRUCCIÓN': { color: 'bg-construccion', icon: 'fa-trowel-bricks', label: 'Construcción' },
            'TECNOLOGIA': { color: 'bg-tecno', icon: 'fa-microchip', label: 'Tecnología' },
            'TEATRO': { color: 'bg-teatro', icon: 'fa-masks-theater', label: 'Teatro' },
            'ED FÍSICA': { color: 'bg-teatro', icon: 'fa-person-running', label: 'Ed. Física' },
            'TUTORIA': { color: 'bg-construccion', icon: 'fa-user-group', label: 'Tutoría' },
            'COMEDOR': { color: 'bg-comedor', icon: 'fa-utensils', label: 'Comedor' }
        };

        const timetable = [
            ['GEOGRAFÍA', 'BIOLOGÍA', 'CONSTRUCCIÓN', 'HISTORIA', '', 'ED FÍSICA'], // Lunes
            ['MATEMATICA', 'GEOGRAFÍA', 'FOR DOC', 'PDL', 'BIOLOGÍA', 'FISÍCO QUÍMICA'], // Martes
            ['FOR DOC', 'MATEMÁTICA', 'PDL', 'INGLÉS', 'TUTORIA', 'COMEDOR', '', 'TECNOLOGIA', 'TECNOLOGIA'], // Miércoles
            ['MATEMÁTICA', 'MATEMATICA', 'TEATRO', 'PDL', 'FISÍCO QUÍMICA', 'TUTORIA', 'TUTORIA'], // Jueves
            ['TEATRO', 'PDL', 'CONSTRUCCIÓN', 'HISTORIA', 'INGLÉS', 'ED FÍSICA'] // Viernes
        ];

        const timeLabels = ['07:40', '08:40', '09:55', '11:05', '12:05', '13:15', '14:30', '14:00', '14:40', '15:30', '16:10'];

        let currentDate = new Date();
        let events = [];
        let currentView = 'month';
        let activeFilter = null;

        // INICIALIZACIÓN
        document.addEventListener('DOMContentLoaded', async () => {
            renderFilters();
            populateSubjectDropdown();
            await loadData();
            
            document.getElementById('loading-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                renderCalendar();
            }, 500);
        });

        async function loadData() {
            try {
                // Intenta cargar de local storage primero
                const local = localStorage.getItem('agenda3roa_events');
                if (local) events = JSON.parse(local);
                
                // En un proyecto real aquí harías el fetch a Google Sheets
                updateStats();
            } catch (e) { console.error(e); }
        }

        function updateStats() {
            const now = new Date();
            const thisMonth = events.filter(e => {
                const d = new Date(e.fecha);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            document.getElementById('stat-pruebas').textContent = thisMonth.filter(e => e.tipo === 'prueba').length;
            document.getElementById('stat-tps').textContent = thisMonth.filter(e => e.tipo === 'tp').length;
            document.getElementById('stat-obligaciones').textContent = thisMonth.filter(e => e.tipo === 'obligacion').length;
        }

        function renderFilters() {
            const container = document.getElementById('subject-filters-desktop');
            const subjects = Object.keys(subjectsConfig).filter(s => s !== 'COMEDOR').sort();
            container.innerHTML = subjects.map(s => `
                <button onclick="toggleFilter('${s}')" class="w-full flex items-center gap-2 p-2 rounded-lg text-xs font-medium transition-all ${activeFilter === s ? 'bg-blue-600 text-white' : 'hover:bg-slate-100 text-slate-600'}">
                    <div class="w-2 h-2 rounded-full ${subjectsConfig[s].color.split(' ')[0]}"></div>
                    ${subjectsConfig[s].label}
                </button>
            `).join('');
        }

        function toggleFilter(s) {
            activeFilter = activeFilter === s ? null : s;
            renderFilters();
            renderCalendar();
        }

        function populateSubjectDropdown() {
            const select = document.getElementById('event-subject');
            const subjects = Object.keys(subjectsConfig).filter(s => s !== 'COMEDOR').sort();
            select.innerHTML = '<option value="">Seleccionar...</option>' + 
                subjects.map(s => `<option value="${s}">${subjectsConfig[s].label}</option>`).join('');
        }

        // LÓGICA DE CALENDARIO
        function renderCalendar() {
            const container = document.getElementById('calendar-content');
            const display = document.getElementById('current-date-display-desktop');
            display.textContent = currentDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }).replace(/^\w/, c => c.toUpperCase());

            if (currentView === 'month') renderMonth(container);
            if (currentView === 'list') renderList(container);
            // ... otras vistas
        }

        function renderMonth(container) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            let html = `<div class="grid grid-cols-7 bg-slate-50 border-b border-slate-200">
                ${['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'].map(d => `<div class="p-3 text-center text-[10px] font-bold text-slate-400 uppercase">${d}</div>`).join('')}
            </div><div class="grid grid-cols-7 gap-px bg-slate-200">`;

            for (let i = 0; i < offset; i++) html += `<div class="bg-white calendar-cell"></div>`;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = new Date().toISOString().split('T')[0] === dateStr;
                let dayEvents = events.filter(e => e.fecha === dateStr);
                if (activeFilter) dayEvents = dayEvents.filter(e => e.materia === activeFilter);

                html += `
                    <div class="bg-white calendar-cell p-2 hover:bg-blue-50 cursor-pointer" onclick="openCreateModal('${dateStr}')">
                        <span class="text-sm font-bold ${isToday ? 'bg-blue-600 text-white w-7 h-7 flex items-center justify-center rounded-full' : 'text-slate-700'}">${d}</span>
                        <div class="mt-1 space-y-1">
                            ${dayEvents.slice(0, 2).map(e => `
                                <div class="text-[9px] font-bold truncate p-1 rounded ${e.tipo === 'prueba' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}">${e.titulo}</div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function onDateChange() {
            const dateVal = document.getElementById('event-date-input').value;
            if (!dateVal) return;
            const d = new Date(dateVal);
            const dayNum = d.getDay(); 
            
            // CORRECCIÓN FINES DE SEMANA: 0=Domingo, 6=Sábado
            const isWeekend = (dayNum === 0 || dayNum === 6);
            const preview = document.getElementById('day-schedule-preview');
            const slots = document.getElementById('schedule-slots');

            if (isWeekend) {
                preview.classList.remove('hidden');
                slots.innerHTML = '<p class="col-span-2 text-[10px] text-red-500 font-bold text-center py-2">Fin de semana: Sin clases</p>';
                return;
            }

            preview.classList.remove('hidden');
            const dayIdx = dayNum - 1; // 0=Lunes
            const schedule = timetable[dayIdx];
            
            slots.innerHTML = schedule.map((sub, idx) => {
                if (!sub || sub === 'COMEDOR') return '';
                return `
                    <button type="button" onclick="selectSlot('${dayIdx}-${idx}', '${sub}')" class="p-2 border rounded-lg text-left hover:border-blue-500 transition-all slot-btn">
                        <div class="text-[8px] text-slate-400 font-bold">${timeLabels[idx]}</div>
                        <div class="text-[10px] font-bold truncate">${sub}</div>
                    </button>
                `;
            }).join('');
        }

        function selectSlot(val, subject) {
            document.getElementById('event-time').value = val;
            document.getElementById('event-subject').value = subject;
            document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('border-blue-600', 'bg-blue-50'));
            event.currentTarget.classList.add('border-blue-600', 'bg-blue-50');
        }

        // FUNCIONES UI
        function openCreateModal(date = null) {
            document.getElementById('event-form').reset();
            if (date) document.getElementById('event-date-input').value = date;
            onDateChange();
            const m = document.getElementById('event-modal');
            m.classList.remove('opacity-0', 'pointer-events-none');
            m.classList.add('modal-active');
        }

        function closeModal() {
            const m = document.getElementById('event-modal');
            m.classList.remove('modal-active');
            m.classList.add('opacity-0', 'pointer-events-none');
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner spinner"></i> Guardando...';

            const data = {
                id: Date.now().toString(),
                fecha: document.getElementById('event-date-input').value,
                materia: document.getElementById('event-subject').value,
                tipo: document.querySelector('input[name="type"]:checked').value,
                titulo: document.getElementById('event-title').value,
                horario: document.getElementById('event-time').value,
                temas: document.getElementById('event-topics').value,
                archivo: document.getElementById('event-file-url').value
            };

            // Simulación de guardado
            events.push(data);
            localStorage.setItem('agenda3roa_events', JSON.stringify(events));
            
            setTimeout(() => {
                showToast('Actividad guardada correctamente');
                closeModal();
                renderCalendar();
                updateStats();
                btn.disabled = false;
                btn.textContent = 'Guardar Actividad';
            }, 1000);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'bg-slate-800 text-white px-6 py-3 rounded-xl shadow-xl font-bold text-sm animate-bounce';
            t.textContent = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function switchView(v) {
            currentView = v;
            renderCalendar();
        }

        function changeDate(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        function toggleModality(show) {
            document.getElementById('modality-group').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
